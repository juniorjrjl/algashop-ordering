spring:
  datasource:
    url: ${DATASOURCE_JDBC_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    url: ${DATASOURCE_JDBC_URL}
    locations: classpath:db/migration
    user: ${FLYWAY_USERNAME}
    password: ${FLYWAY_PASSWORD}

algashop:
  integrations:
    rapidex:
      url: ${RAPIDEX_URL}
    product-catalog:
      url: ${PRODUCT_CATALOG_URL}
  free-shipping:
    min-basic-loyalty-points: 200
    min-basic-sales-amount-in-year: 2
    min-premium-loyalty-points: 2000