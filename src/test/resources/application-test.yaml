spring:
  application:
    name: ordering
  datasource:
    url: jdbc:postgresql://localhost:5432/ordering_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 10
      connection-timeout: 3000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false
    #url: jdbc:postgresql://localhost:5432/ordering_test
    #locations: classpath:db/migration
    #user: postgres
    #password: postgres

algashop:
  integrations:
    shipping:
      provider: RAPIDEX
    rapidex:
      url: http://localhost:8780
    product-catalog:
      url: http://localhost:8781
  free-shipping:
    min-basic-loyalty-points: 200
    min-basic-sales-amount-in-year: 2
    min-premium-loyalty-points: 2000